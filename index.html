<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Sukan Sekolah 2.0</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}
.container{padding:20px;max-width:1200px;margin:auto;}
.card{
    background: rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    backdrop-filter: blur(8px);
}
h1{text-align:center;font-size:32px;}
button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
.yellow{background:#FFD700;color:black;}
input,select{
    padding:8px;
    border-radius:6px;
    border:none;
}
.rank-item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
    animation:fadeIn 0.6s ease;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}
.gold{background:linear-gradient(90deg,#FFD700,#FFA500);}
.silver{background:linear-gradient(90deg,#C0C0C0,#A9A9A9);}
.bronze{background:linear-gradient(90deg,#cd7f32,#a97142);}
@media(max-width:768px){
    h1{font-size:24px;}
}
</style>
</head>

<body>
<div class="container">

<h1>🏆 SISTEM SUKAN SEKOLAH 2.0</h1>

<div class="card">
<h3>🔐 Login Admin</h3>
<input type="password" id="adminPin" placeholder="Masukkan PIN">
<button class="yellow" onclick="loginAdmin()">Login</button>
<button onclick="toggleTV()">TV Mode</button>
</div>

<div class="card" id="adminPanel" style="display:none;">
<h3>Tambah Markah</h3>

<select id="muridSelect"></select>
<select id="pertandinganSelect"></select>
<select id="kedudukanSelect"></select>

<button class="yellow" onclick="submitMarkah()">Simpan</button>
</div>

<div class="card">
<h3>Kedudukan Rumah</h3>
<div id="ranking"></div>
</div>

<div class="card">
<h3>Top 10 Pelajar</h3>
<select id="kategoriFilter" onchange="renderTop10()">
<option value="K1">K1</option>
<option value="K2">K2</option>
<option value="K3">K3</option>
</select>
<div id="top10"></div>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyIOXYjFn3NR3OHWOshCK4MulOBE4rcrifz1RlESG9enNQTANtNvTTVR008Xan-gz5t/exec";
let db = {};
let isAdmin = false;

/* ================= AUTO REFRESH ================= */
setInterval(fetchData,30000);
fetchData();

/* ================= LOGIN ================= */
async function loginAdmin(){
    const pin = document.getElementById("adminPin").value;
    const res = await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({type:"login",pin:pin})
    });
    const data = await res.json();
    if(data.status==="success"){
        isAdmin=true;
        document.getElementById("adminPanel").style.display="block";
        alert("Login berjaya");
    }else{
        alert("PIN salah");
    }
}

/* ================= FETCH DATA ================= */
async function fetchData(){
    const res = await fetch(API_URL);
    db = await res.json();
    populateDropdowns();
    renderRanking();
    renderTop10();
}

/* ================= DROPDOWN ================= */
function populateDropdowns(){
    if(!db.murid) return;

    document.getElementById("muridSelect").innerHTML=
        db.murid.map(m=>`<option value="${m.murid id}">${m.nama}</option>`);

    document.getElementById("pertandinganSelect").innerHTML=
        db.pertandingan.map(p=>`<option value="${p.pertandingan id}">${p.nama pertandingan}</option>`);

    const kedudukan = [
        {nama:"Emas",mata:10},
        {nama:"Perak",mata:7},
        {nama:"Gangsa",mata:5},
        {nama:"Keempat",mata:3}
    ];

    document.getElementById("kedudukanSelect").innerHTML=
        kedudukan.map(k=>`<option value="${k.mata}">${k.nama}</option>`);
}

/* ================= SIMPAN MARKAH ================= */
async function submitMarkah(){
    const murid = muridSelect.value;
    const pertandingan = pertandinganSelect.value;
    const mata = parseInt(kedudukanSelect.value);

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            type:"add",
            murid_id:murid,
            pertandingan_id:pertandingan,
            mata:mata
        })
    });

    fetchData();
}

/* ================= RANKING RUMAH ================= */
function renderRanking(){
    if(!db.rumahsukan) return;

    let result = {};

    db.rumahsukan.forEach(r=>result[r.house id]=0);

    db.penyertaan.forEach(p=>{
        const murid = db.murid.find(m=>m["murid id"]===p["murid id"]);
        if(murid){
            result[murid["house id"]] += parseInt(p.mata);
        }
    });

    let sorted = Object.entries(result).sort((a,b)=>b[1]-a[1]);

    let html="";
    sorted.forEach((r,i)=>{
        let cls="";
        if(i===0) cls="gold";
        else if(i===1) cls="silver";
        else if(i===2) cls="bronze";

        html+=`<div class="rank-item ${cls}">
        <span>${i+1}. ${r[0]}</span>
        <strong>${r[1]} mata</strong>
        </div>`;
    });

    document.getElementById("ranking").innerHTML=html;
}

/* ================= TOP 10 ================= */
function renderTop10(){
    const kategori = document.getElementById("kategoriFilter").value;

    let result={};

    db.murid.filter(m=>m.kategori===kategori)
    .forEach(m=>result[m.nama]=0);

    db.penyertaan.forEach(p=>{
        const murid = db.murid.find(m=>m["murid id"]===p["murid id"] && m.kategori===kategori);
        if(murid){
            result[murid.nama]+=parseInt(p.mata);
        }
    });

    let sorted = Object.entries(result).sort((a,b)=>b[1]-a[1]).slice(0,10);

    let html="";
    sorted.forEach((s,i)=>{
        html+=`<div class="rank-item">
        <span>${i+1}. ${s[0]}</span>
        <strong>${s[1]} mata</strong>
        </div>`;
    });

    document.getElementById("top10").innerHTML=html;
}

/* ================= TV MODE ================= */
function toggleTV(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
}
</script>

</body>
</html>
