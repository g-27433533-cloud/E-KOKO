<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Sukan Sekolah 5.0</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}
.container{padding:20px;max-width:1200px;margin:auto;}
.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
margin-bottom:20px;
backdrop-filter:blur(8px);
}
h1{text-align:center;}
input,select,button{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}
.yellow{background:#FFD700;color:black;font-weight:bold;}
.rank-item{
display:flex;
justify-content:space-between;
padding:10px;
margin-bottom:8px;
border-radius:8px;
}
.gold{background:linear-gradient(90deg,#FFD700,#FFA500);}
.silver{background:linear-gradient(90deg,#C0C0C0,#A9A9A9);}
.bronze{background:linear-gradient(90deg,#cd7f32,#a97142);}

/* PODIUM */
.podium-wrapper{
display:flex;
justify-content:center;
align-items:flex-end;
height:220px;
margin-top:20px;
}
.podium-block{
width:90px;
margin:0 15px;
text-align:center;
color:black;
font-weight:bold;
border-radius:10px 10px 0 0;
animation:rise 1s ease;
}
.first{background:gold;height:150px;}
.second{background:silver;height:120px;}
.third{background:#cd7f32;height:90px;}
@keyframes rise{
from{transform:translateY(150px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}
</style>
</head>

<body>
<div class="container">

<h1>🏆 SISTEM SUKAN SEKOLAH 5.0</h1>

<div class="card">
<h3>🔐 Login Admin</h3>
<input type="password" id="adminPin" placeholder="Masukkan PIN">
<button class="yellow" onclick="loginAdmin()">Login</button>
</div>

<div class="card" id="adminPanel" style="display:none;">
<h3>Tambah Markah</h3>

<select id="rumahFilter" onchange="filterMurid()"></select>
<select id="kategoriFilter" onchange="filterMurid()">
<option value="">Semua Kategori</option>
<option value="K1">K1</option>
<option value="K2">K2</option>
<option value="K3">K3</option>
</select>

<br>

<select id="muridSelect"></select>
<select id="pertandinganSelect"></select>
<select id="kedudukanSelect"></select>

<button class="yellow" onclick="submitMarkah()">Simpan</button>
</div>

<div class="card">
<h3>Kedudukan Rumah</h3>
<div id="podium3d"></div>
<div id="ranking"></div>
</div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyIOXYjFn3NR3OHWOshCK4MulOBE4rcrifz1RlESG9enNQTANtNvTTVR008Xan-gz5t/exec";
let db={};
let isAdmin=false;

fetchData();
setInterval(fetchData,30000);

/* LOGIN */
async function loginAdmin(){
const pin=document.getElementById("adminPin").value;
const res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({type:"login",pin})
});
const data=await res.json();
if(data.status==="success"){
isAdmin=true;
adminPanel.style.display="block";
alert("Login berjaya");
}else{
alert("PIN salah");
}
}

/* FETCH */
async function fetchData(){
const res=await fetch(API_URL);
db=await res.json();
populateFilters();
populatePertandingan();
renderRanking();
}

/* RUMAH */
function populateFilters(){
if(!db.rumahsukan)return;

rumahFilter.innerHTML=
db.rumahsukan.map(r=>
`<option value="${r["HOUSE ID"]}">${r["RumahSukan"]}</option>`
).join("");

filterMurid();
}

/* FILTER MURID */
function filterMurid(){
const rumah=rumahFilter.value;
const kategori=kategoriFilter.value;

let filtered=db.murid.filter(m=>{
return (rumah?m["HOUSE ID"]===rumah:true) &&
(kategori?m.KATEGORI===kategori:true);
});

muridSelect.innerHTML=
filtered.map(m=>`<option value="${m["MURID ID"]}">${m.NAMA}</option>`).join("");
}

/* PERTANDINGAN */
function populatePertandingan(){
if(!db.pertandingan)return;

pertandinganSelect.innerHTML=
db.pertandingan.map(p=>
`<option value="${p["PERTANDINGAN ID"]}">
${p["NAMA PERTANDINGAN"]} (${p.JENIS})
</option>`).join("");

kedudukanSelect.innerHTML=
["Emas","Perak","Gangsa","Keempat"].map(k=>
`<option value="${k}">${k}</option>`).join("");
}

/* SIMPAN */
async function submitMarkah(){
await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
type:"add",
murid_id:muridSelect.value,
pertandingan_id:pertandinganSelect.value,
kedudukan:kedudukanSelect.value
})
});
fetchData();
}

/* RANKING */
function renderRanking(){
if(!db.rumahsukan)return;

let result={};
db.rumahsukan.forEach(r=>result[r["HOUSE ID"]]=0);

db.penyertaan.forEach(p=>{
const murid=db.murid.find(m=>m["MURID ID"]===p["MURID ID"]);
if(murid){
result[murid["HOUSE ID"]]+=parseInt(p.MATA||0);
}
});

let sorted=Object.entries(result).sort((a,b)=>b[1]-a[1]);

let podium=`<div class="podium-wrapper">`;
if(sorted[1])podium+=`<div class="podium-block second">${sorted[1][0]}<br>${sorted[1][1]}</div>`;
if(sorted[0])podium+=`<div class="podium-block first">${sorted[0][0]}<br>${sorted[0][1]}</div>`;
if(sorted[2])podium+=`<div class="podium-block third">${sorted[2][0]}<br>${sorted[2][1]}</div>`;
podium+=`</div>`;
podium3d.innerHTML=podium;

ranking.innerHTML=
sorted.map((r,i)=>`
<div class="rank-item ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">
${i+1}. ${r[0]} — ${r[1]} mata
</div>
`).join("");
}
</script>
</body>
</html>
